<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural Proz</title>
    <link rel="stylesheet" href="style/reset.css"> <!--limpa estilo css padrão dos navegadores -->
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
    <link rel="stylesheet" href="style/header.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/footer.css">
</head>

<body>

    <header class="header__content">
        <div class="header__top">
            <div class="header__logo">
                <div class="img-background">
                    <img class="header__img" src="imgs/placeholderLogo.png" alt="">
                </div>
            </div>

            <div class="header__h1">
                <h1>Mural da Proz</h1>
            </div>

            <div class="header__user">
                <div class="a-button login">
                    <a class="" href=""> Login </a>
                </div>

                <div class="a-button subscribe">
                    <a href=""> Cadrastre-se</a>
                </div>
            </div>
        </div>

        <nav class="header__nav">

            <div class="nav__content">
                <ul class="nav__list-sections">
                    <li>Todos</li>
                    <li>Vagas</li>
                    <li>Avisos</li>
                    <li>Posts</li>
                </ul>

            </div>
        </nav>
    </header>

    <main class="main__content">
        <div class="board-posts">

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_green.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_pink.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_orange.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_red.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_white.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_orange.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_green.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_pink.png" alt="">

                </div>
            </div>

            <div class="post">
                <div class="pin">
                    <img src="imgs/pin_green.png" alt="">

                </div>
            </div>
                <div class="post">
                    <div class="pin">
                        <img src="imgs/pin_pink.png" alt="">

                    </div>
                </div>

                    <div class="create-post">

                        <div class="create-paper">
                            <H1>FODA</H1>
                            <label for=""></label>
                            <input type="text">

                            <select name="" id="">
                                <option value="">Vagas</option>
                                <option value="">Avisos</option>
                                <option value="">Posts</option>
                            </select>
                            
                        </div>

                        <div class="main__buttom">
                            <button class="buttom-add-post">+</button>
                        </div>

                    </div>

    </main>

    <footer class="footer__content">
        <div class="footer__credits">
            <div class="credits-github">
                <h1>Git hub dos cria</h1>
            </div>

        </div>

    </footer>

    <script src="src/script.js"></script>

</body>

</html>
